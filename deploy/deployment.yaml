apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastmcp-server
  namespace: mcp-servers
  labels:
    app: fastmcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fastmcp-server
  template:
    metadata:
      labels:
        app: fastmcp-server
    spec:
      containers:
        - name: mcp-server
          image: image-registry.openshift-image-registry.svc:5000/mcp-servers/fastmcp-server:latest
          ports:
            - containerPort: 8000
          env:
            - name: API_BASE_URL
              value: https://localhost:8080
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: fastmcp-server
  namespace: mcp-servers
  labels:
    app: fastmcp-server
spec:
  selector:
    app: fastmcp-server
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: fastmcp-server
  namespace: mcp-servers
  labels:
    app: fastmcp-server
spec:
  to:
    kind: Service
    name: fastmcp-server
  port:
    targetPort: 8000
  tls:
    termination: edge